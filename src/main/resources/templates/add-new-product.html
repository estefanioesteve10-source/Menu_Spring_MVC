<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
    <body>
    <!-- O caminho deve incluir /products -->
        <form th:action="@{/products/addNewProduct}" th:object="${product}" method="post">
            <label>ID:</label>
            <input type="number" th:field="*{id}">
            <br>

            <label>Name:</label>
            <input type="text" th:field="*{name}">
            <br>

            <label>Price:</label>
            <input type="number" step="0.01" th:field="*{price}">
            <br>

            <button type="submit">Add Product</button>
        </form>

    </body>
</html>
